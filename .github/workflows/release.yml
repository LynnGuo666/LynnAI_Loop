name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build

      - name: Build binaries
        working-directory: backend
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          CGO_ENABLED: "0"
        run: |
          GOOS=linux   GOARCH=amd64 go build -ldflags "-X loop/internal/version.Version=$VERSION" -o ../dist/loop-linux-amd64 .
          GOOS=linux   GOARCH=arm64 go build -ldflags "-X loop/internal/version.Version=$VERSION" -o ../dist/loop-linux-arm64 .
          GOOS=darwin  GOARCH=amd64 go build -ldflags "-X loop/internal/version.Version=$VERSION" -o ../dist/loop-darwin-amd64 .
          GOOS=darwin  GOARCH=arm64 go build -ldflags "-X loop/internal/version.Version=$VERSION" -o ../dist/loop-darwin-arm64 .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/loop-*
          name: ${{ steps.version.outputs.VERSION }}
