services:
  loop:
    image: ghcr.io/lynnguo666/lynnai_loop:latest
    build: .
    ports:
      - "8080:8080"
    volumes:
      - loop-data:/data
    environment:
      - DB_PATH=/data/loop.db
      - ENV_PATH=/data/.env
      - PORT=8080
      # Set a fixed admin token here if needed. If omitted, Loop writes one to /data/.env.
      - ADMIN_TOKEN=${ADMIN_TOKEN:-}
    restart: unless-stopped

volumes:
  loop-data:
